---
name: Release Jobs

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - id: version
        run: |
          # Extract version from src/emojirades/__init__.py
          VERSION=$(PYTHONPATH=src uv run python3 -c 'import emojirades; print(emojirades.VERSION)')
          # Remove leading 'v' if present for the asset filenames
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - id: create_release
        uses: softprops/action-gh-release@v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true

    outputs:
      version: ${{ steps.version.outputs.version }}
      release_upload_url: ${{ steps.create_release.outputs.upload_url }}

  build_python:
    runs-on: ubuntu-24.04
    needs: release

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Build package
        run: uv build

      - name: upload sdist
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.release_upload_url }}
          asset_path: ./dist/emojirades-${{ needs.release.outputs.version }}.tar.gz
          asset_name: emojirades-${{ needs.release.outputs.version }}.tar.gz
          asset_content_type: application/tar+gzip

      - name: upload bdist_wheel
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.release_upload_url }}
          asset_path: ./dist/emojirades-${{ needs.release.outputs.version }}-py3-none-any.whl
          asset_name: emojirades-${{ needs.release.outputs.version }}-py3-none-any.whl
          asset_content_type: application/x-pywheel+zip

      - uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  build_container:
    runs-on: ubuntu-24.04
    needs: release

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            emojirades/emojirades
            ghcr.io/emojirades/emojirades

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
